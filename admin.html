<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — ياسر العمري</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --red:#E03030; --red-light:#FF4444; --red-dim:rgba(224,48,48,0.12); --red-border:rgba(224,48,48,0.28);
      --white:#F3F1EE; --gray-100:#d4d0c8; --gray-300:#9a9795; --gray-500:#4a4845;
      --gray-700:#252422; --gray-800:#1a1917; --gray-900:#0f0e0d; --black:#080807;
      --green:#2ecc71; --green-dim:rgba(46,204,113,0.1); --green-border:rgba(46,204,113,0.3);
    }
    *{
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Cairo', 'Tajawal', sans-serif; scroll-behavior: smooth;
    }
    body{
      background: var(--black); color: var(--white); min-height: 100vh;
      padding: 2rem 1rem; display: flex; flex-direction: column; gap: 2rem; max-width: 1200px; margin: 0 auto;
    }
    header{
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--gray-700); padding-bottom: 1.5rem;
    }
    h1{ font-size: 1.75rem; font-weight: 900; letter-spacing: -0.5px; }
    .status-panel{\n      display: flex; align-items: center; gap: 0.75rem;
      background: var(--gray-900); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--gray-800);
    }
    .dot{
      width: 8px; height: 8px; border-radius: 50%; background: var(--gray-500);
    }
    .dot.success{ background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.error{ background: var(--red); box-shadow: 0 0 8px var(--red); }
    .dot.loading{
      background: #f1c40f; box-shadow: 0 0 8px #f1c40f;
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { 0%{opacity:0.4;} 100%{opacity:1;} }
    .status-text{ font-size: 0.85rem; color: var(--gray-100); }
    
    .actions-bar{
      display: flex; justify-content: flex-end; gap: 1rem; position: sticky; top: 1rem; z-index: 100;
    }
    button{\n      background: var(--gray-800); color: var(--white); border: 1px solid var(--gray-700);
      padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 600;
      font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.2s;
    }
    button:hover{ background: var(--gray-700); border-color: var(--gray-500); }
    button.primary{
      background: var(--white); color: var(--black); border-color: var(--white);
    }
    button.primary:hover{ background: #e2dfda; }
    button.danger-btn{
      background: var(--red-dim); color: var(--red-light); border-color: var(--red-border);
    }
    button.danger-btn:hover{ background: var(--red); color: var(--white); }

    .grid-container{
      display: grid; grid-template-columns: 1fr; gap: 2rem;
    }
    @media(min-width: 900px){ .grid-container{ grid-template-columns: 350px 1fr; } }

    .card{
      background: var(--gray-900); border: 1px solid var(--gray-800); border-radius: 12px; padding: 1.5rem;
    }
    .card h2{ font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--gray-100); border-right: 3px solid var(--red); padding-right: 0.5rem; }

    .form-group{
      margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.4rem;
    }
    .form-group label{ font-size: 0.85rem; color: var(--gray-300); font-weight: 600; }
    input, select, textarea{
      background: var(--black); color: var(--white); border: 1px solid var(--gray-700);
      padding: 0.6rem; border-radius: 6px; font-size: 0.9rem; outline: none; transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus{ border-color: var(--gray-300); }
    
    .stats-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .stat-item{
      background: var(--black); border: 1px solid var(--gray-800); padding: 0.75rem; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .stat-info h4{ font-size: 0.95rem; }
    .stat-info p{ font-size: 0.75rem; color: var(--gray-300); font-family: 'JetBrains Mono', monospace; }

    .cat-box {
      background: var(--gray-900); border: 1px solid var(--gray-800); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .cat-header{
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--gray-800); padding-bottom: 0.75rem;
    }
    .video-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    .video-table th {
      text-align: right; padding: 0.5rem; font-size: 0.8rem; color: var(--gray-300); border-bottom: 1px solid var(--gray-700);
    }
    .video-table td { padding: 0.6rem 0.5rem; font-size: 0.85rem; border-bottom: 1px solid var(--gray-800); }
    .video-title { font-weight: 600; }
    .video-id { font-family: 'JetBrains Mono', monospace; color: var(--gray-300); font-size: 0.75rem; }
    
    .ctrl-btns { display: flex; gap: 0.25rem; justify-content: flex-end; }
    .ctrl-btns button { padding: 0.3rem 0.5rem; font-size: 0.75rem; border-radius: 4px; }

    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--white); color: var(--black); padding: 0.75rem 2rem; border-radius: 50px;
      font-weight: 700; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; opacity: 0; pointer-events: none; z-index: 1000;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error { background: var(--red); color: var(--white); }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 500;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--gray-900); border: 1px solid var(--gray-800); border-radius: 12px; padding: 2rem;
      max-width: 500px; width: 90%; display: flex; flex-direction: column; gap: 1.5rem;
    }
    .modal-btns { display: flex; justify-content: flex-end; gap: 1rem; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>لوحة التحكم واستوديو البيانات</h1>
      <p style="color:var(--gray-300); font-size:0.85rem; margin-top:0.25rem;">تعديل إحصائيات وأعمال موقع ياسر العمري</p>
    </div>
    <div class="status-panel">
      <div id="status-dot" class="dot"></div>
      <span id="status-text" class="status-text">جاري فحص الاتصال...</span>
    </div>
  </header>

  <div class="actions-bar">
    <button onclick="addNewCategory()">📁 إضافة قسم جديد</button>
    <button class="primary" onclick="saveToGitHub()">💾 حفظ التغييرات والرفع أونلاين</button>
  </div>

  <div class="grid-container">
    <div style="display: flex; flex-direction: column; gap: 2rem;">
      <div class="card">
        <h2>الأرقام والإنجازات (Stats)</h2>
        <div id="stats-list" class="stats-list"></div>
      </div>
      
      <div class="card" style="position: sticky; top: 5.5rem;">
        <h2>إضافة فيديو جديد</h2>
        <div class="form-group">
          <label>القسم المستهدف</label>\n          <select id="v-cat-select"></select>
        </div>
        <div class="form-group">
          <label>عنوان الفيديو (العربية)</label>
          <input type="text" id="v-title-ar" placeholder="مثال: إعلان شركة العروبة"/>
        </div>
        <div class="form-group">
          <label>عنوان الفيديو (الإنجليزية)</label>
          <input type="text" id="v-title-en" placeholder="مثال: Al Orouba Ad"/>
        </div>
        <div class="form-group">
          <label>معرّف الفيديو من يوتيوب (YouTube Video ID)</label>
          <input type="text" id="v-id" placeholder="مثال: dQw4w9WgXcQ" style="font-family:monospace;"/>
          <p style="font-size:0.7rem; color:var(--gray-300);">ضع الرموز التي تظهر بعد الـ (=) في رابط الفيديو فقط.</p>
        </div>
        <button class="primary" style="width:100%; justify-content:center; margin-top:0.5rem;" onclick="addVideoSubmit()">➕ إدراج الفيديو في القائمة</button>
      </div>
    </div>

    <div id="categories-container"></div>
  </div>

  <div id="toast"></div>

  <div id="stat-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="stat-modal-title">تعديل الإحصائية</h3>
      <div class="form-group">
        <label>الرقم الرقمي (Value)</label>
        <input type="number" id="m-stat-val"/>
      </div>
      <div class="form-group">
        <label>العنوان بالعربية (Label AR)</label>
        <input type="text" id="m-stat-ar"/>
      </div>
      <div class="form-group">
        <label>العنوان بالإنجليزية (Label EN)</label>
        <input type="text" id="m-stat-en"/>
      </div>
      <div class="modal-btns">
        <button onclick="closeModal('stat-modal')">إلغاء</button>
        <button class="primary" id="stat-save-btn">تأكيد وتعديل</button>
      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal-overlay">
    <div class="modal" style="gap:1rem;">
      <h3 id="confirm-title" style="color:var(--red-light);">تأكيد الحذف</h3>
      <p id="confirm-sub" style="font-size:0.9rem; color:var(--gray-100);"></p>
      <div class="modal-btns" style="margin-top:1rem;">
        <button onclick="closeConfirm()">إلغاء</button>\n        <button class="danger-btn" id="confirm-ok-btn">نعم، احذف نهائياً</button>
      </div>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════
       CONFIG CONFIGURATION
    ══════════════════════════════════ */
    const GITHUB_OWNER = 'mazen1-1';
    const GITHUB_REPO  = 'YASIR-ALAMRI';
    const DATA_FILE    = 'portfolio-data.json';
    
    let stats = [];
    let categories = [];

    window.addEventListener('DOMContentLoaded', fetchCurrentData);

    // جلب البيانات من جيتهاب لعرضها في لوحة التحكم بشكل آمن
    async function fetchCurrentData() {
      setStatus('loading', 'جاري جلب آخر البيانات الحالية من سرفر GitHub...');
      
      let token = localStorage.getItem('gh_token');
      if(!token) {
        token = prompt("الرجاء إدخال GitHub Personal Access Token الخاص بك أولاً لتفعيل التعديل والقراءة الأمنة:");
        if(token) localStorage.setItem('gh_token', token.trim());
      }

      const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE}?t=${Date.now()}`;
      
      try {
        let res = await fetch(url, {
          headers: token ? { 'Authorization': `token ${token}` } : {}
        });
        if(!res.ok) throw new Error('فشل جلب الملف الرئيسي، يرجى التحقق من التوكن أو اسم الريبو');
        
        const fileInfo = await res.json();
        const rawContent = decodeURIComponent(escape(atob(fileInfo.content)));
        const data = JSON.parse(rawContent);
        
        stats = data.stats || [];
        categories = data.categories || [];
        
        renderStats();
        renderCategories();
        setStatus('success', 'متصل بـ GitHub وجاهز للتعديل');
      } catch (e) {
        console.error(e);
        setStatus('error', 'فشل الربط بالملف أونلاين. تأكد من إعدادات التوكن والمستودع');
        showToast('❌ خطأ في الاتصال بالملف أونلاين', 'error');
      }
    }

    /* ══════════════════════════════════
       RENDER FUNCTIONS
    ══════════════════════════════════ */
    function renderStats() {
      const container = document.getElementById('stats-list');
      container.innerHTML = '';
      stats.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'stat-item';
        div.innerHTML = `
          <div class="stat-info">
            <h4>${s.labelAr} (${s.prefix || ''}${s.value}${s.suffix || ''})</h4>
            <p>${s.labelEn}</p>
          </div>
          <button onclick="editStatModal(${i})">✏ تعديل</button>
        `;
        container.appendChild(div);
      });
    }

    function renderCategories() {
      const container = document.getElementById('categories-container');
      const select = document.getElementById('v-cat-select');
      container.innerHTML = '';
      select.innerHTML = '';

      categories.forEach((cat, ci) => {
        const opt = document.createElement('option');
        opt.value = ci;
        opt.textContent = cat.title || `قسم بدون عنوان ${ci}`;
        select.appendChild(opt);

        const box = document.createElement('div');
        box.className = 'cat-box';
        
        let vRows = '';
        if(!cat.videos || cat.videos.length === 0) {
          vRows = `<tr><td colspan="3" style="text-align:center; color:var(--gray-500); padding:2rem;">لا توجد فيديوهات مضافة في هذا القسم حالياً</td></tr>`;
        } else {
          cat.videos.forEach((v, vi) => {
            vRows += `
              <tr>
                <td>
                  <div class="video-title">${v.titleAr || v.title}</div>
                  <div class="video-id">ID: ${v.id}</div>
                </td>
                <td style="color:var(--gray-300); text-align:left;">${v.titleEn || '-'}</td>
                <td>
                  <div class="ctrl-btns">
                    <button onclick="moveVideo(${ci}, ${vi}, -1)">▲</button>\n                    <button onclick="moveVideo(${ci}, ${vi}, 1)">▼</button>
                    <button class="danger-btn" onclick="deleteVideo(${ci}, ${vi})">🗑 حذف</button>
                  </div>
                </td>
              </tr>
            `;
          });
        }

        box.innerHTML = `
          <div class="cat-header">
            <div>
              <h3 style="font-size:1.1rem; font-weight:700;">${cat.title}</h3>
              <p style="font-size:0.75rem; color:var(--gray-300); margin-top:0.15rem;">النوع والمظهر (Layout): <span style="font-family:monospace; color:var(--red-light);">${cat.layout}</span></p>
            </div>
            <button class="danger-btn" style="padding:0.4rem 0.8rem; font-size:0.8rem;" onclick="deleteCategory(${ci})">حذف القسم بالكامل</button>
          </div>
          <table class="video-table">
            <thead>
              <tr>
                <th>العنوان العربي / المعرف</th>
                <th style="text-align:left;">العنوان الإنجليزي</th>
                <th style="width:120px; text-align:left;">إجراءات</th>
              </tr>
            </thead>
            <tbody>${vRows}</tbody>
          </table>
        `;
        container.appendChild(box);
      });
    }

    /* ══════════════════════════════════
       EDIT ACTIONS
    ══════════════════════════════════ */
    function editStatModal(i) {
      const s = stats[i];
      document.getElementById('m-stat-val').value = s.value;
      document.getElementById('m-stat-ar').value  = s.labelAr;
      document.getElementById('m-stat-en').value  = s.labelEn;
      
      openModal('stat-modal');
      document.getElementById('stat-save-btn').onclick = () => {
        stats[i].value   = parseInt(document.getElementById('m-stat-val').value) || 0;
        stats[i].labelAr = document.getElementById('m-stat-ar').value;
        stats[i].labelEn = document.getElementById('m-stat-en').value;
        closeModal('stat-modal');
        renderStats();
        showToast('تم تحديث قيمة الإحصائية محلياً');
      };
    }

    function addNewCategory() {
      const title = prompt("أدخل اسم القسم الجديد (مثال: فيديوهات سينمائية):");
      if(!title) return;
      const layout = prompt("أدخل نوع العرض للمقاطع (اكتب wide للشاشات العريضة أو shorts للمقاطع الطولية):", "wide");
      if(layout !== 'wide' && layout !== 'shorts') {
        alert('يجب كتابة واختيار إما wide أو shorts فقط بشكل صحيح!');
        return;
      }
      categories.push({ title, layout, videos: [] });
      renderCategories();
      showToast('تم إنشاء القسم بنجاح، يمكنك الآن إضافة فيديوهات فيه');
    }

    function deleteCategory(ci) {
      showConfirm('هل أنت متأكد من حذف القسم بالكامل؟', `سيتم مسح قسم "${categories[ci].title}" بكل الفيديوهات التي يحتوي عليها ولا يمكن الاسترجاع.`, () => {
        categories.splice(ci, 1);
        renderCategories();
        showToast('تم حذف القسم بنجاح');
      });
    }

    function addVideoSubmit() {
      const ci = document.getElementById('v-cat-select').value;
      const titleAr = document.getElementById('v-title-ar').value.trim();
      const titleEn = document.getElementById('v-title-en').value.trim();
      const id = document.getElementById('v-id').value.trim();

      if(ci === '' || !titleAr || !id) {
        showToast('❌ يرجى ملء حقول العنوان العربي، والمعرّف واختيار القسم الصحيح', 'error');
        return;
      }

      categories[ci].videos.push({ title: titleAr, titleAr, titleEn, id });
      
      document.getElementById('v-title-ar').value = '';
      document.getElementById('v-title-en').value = '';
      document.getElementById('v-id').value = '';
      
      renderCategories();
      showToast('🎉 تم إدراج الفيديو في القائمة المحددة بنجاح!');
    }

    function deleteVideo(ci, vi) {
      showConfirm('هل تود حذف هذا الفيديو؟', `سيتم إزالة الفيديو من قسم ${categories[ci].title}.`, () => {
        categories[ci].videos.splice(vi, 1);
        renderCategories();
        showToast('تم حذف الفيديو');
      });
    }

    function moveVideo(ci, vi, dir) {
      const vids = categories[ci].videos;
      const ni   = vi + dir;
      if (ni < 0 || ni >= vids.length) return;
      [vids[vi], vids[ni]] = [vids[ni], vids[vi]];
      renderCategories();
    }

    /* ══════════════════════════════════
       SERVER SAVE TO GITHUB API
    ══════════════════════════════════ */
    async function saveToGitHub() {
      let token = localStorage.getItem('gh_token');
      if(!token) {
        token = prompt("مطلوب ملء الـ Token لحفظ التغييرات أونلاين:");
        if(!token) return;
        localStorage.setItem('gh_token', token.trim());
      }

      setStatus('loading', 'جاري حفظ ورفع التعديلات إلى سرفرات GitHub...');

      try {
        const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE}`;
        
        const fileRes = await fetch(apiUrl, {
          headers: { 'Authorization': `token ${token}` }
        });
        
        if(!fileRes.ok) {
          if(fileRes.status === 401 || fileRes.status === 403) {
            localStorage.removeItem('gh_token');
            throw new Error('التوكن غير صحيح أو انتهت صلاحيته، سيتم إعادة طلبه');
          }
          throw new Error('فشل الوصول لبنية البيانات، تأكد من إعدادات مستودعك');
        }
        
        const fileData = await fileRes.json();
        const fileSha = fileData.sha; 

        const newContentObj = { stats, categories };
        const jsonString = JSON.stringify(newContentObj, null, 2);
        
        // تشفير يدعم اللغة العربية بشكل آمن لتجنب حدوث أي أخطاء في السيرفر
        const utf8Bytes = new TextEncoder().encode(jsonString);
        const base64Content = btoa(String.fromCharCode(...utf8Bytes));

        const putRes = await fetch(apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: 'تحديث المحتوى من لوحة التحكم المستقلة للأدمن',
            content: base64Content,
            sha: fileSha
          })
        });

        if (!putRes.ok) throw new Error('فشلت عملية الكتابة أو الإرسال لخادم جيتهاب الرئيسي');

        setStatus('success', 'متصل بـ GitHub وجاهز للتعديل');
        showToast('🎉 تم التحديث والرفع أونلاين بنجاح ممتاز!');
        
      } catch(e) {
        console.error(e);
        setStatus('error', e.message);
        showToast('❌ خطأ أثناء المزامنة: ' + e.message, 'error');
      }
    }

    /* ══════════════════════════════════
       UI OVERLAYS HELPERS
    ══════════════════════════════════ */
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function showConfirm(title, sub, cb) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-sub').textContent   = sub;
      document.getElementById('confirm-modal').classList.add('active');
      document.getElementById('confirm-ok-btn').onclick = () => { cb(); closeConfirm(); };
    }
    function closeConfirm() { document.getElementById('confirm-modal').classList.remove('active'); }

    let toastTimer = null;
    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className=''; }, 3500);
    }

    function setStatus(state, text) {
      const dot  = document.getElementById('status-dot');
      const span = document.getElementById('status-text');
      dot.className  = 'dot ' + (state==='loading'?'loading':state);
      span.textContent = text;
    }
  </script>
</body>
</html>
